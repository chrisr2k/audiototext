# ============================================================
# AudioToText - Docker Compose for OCI Deployment
# ============================================================
# Usage:
#   docker compose up -d                    # Start all services
#   docker compose logs -f                  # Follow logs
#   docker compose down                     # Stop all services
#   docker compose exec app python -m app.create_admin  # Create admin user
#
# Let's Encrypt:
#   Set LETS_ENCRYPT_ENABLED=true in .env, then:
#   docker compose --profile letsencrypt up -d
# ============================================================

version: "3.8"

services:
  # ---- PostgreSQL Database ----
  db:
    image: postgres:16-alpine
    container_name: audiototext-db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-audiototext}
      POSTGRES_USER: ${POSTGRES_USER:-audiototext}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-audiototext} -d ${POSTGRES_DB:-audiototext}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - audiototext-network

  # ---- FastAPI Application ----
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: audiototext-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-audiototext}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-audiototext}

      # OCI Credentials
      OCI_USER_OCID: ${OCI_USER_OCID:-}
      OCI_TENANCY_OCID: ${OCI_TENANCY_OCID:-}
      OCI_FINGERPRINT: ${OCI_FINGERPRINT:-}
      # For Docker: set OCI_PRIVATE_KEY with the full PEM content (single line with \n)
      # For local dev: set OCI_PRIVATE_KEY_PATH pointing to the .pem file
      OCI_PRIVATE_KEY: ${OCI_PRIVATE_KEY:-}
      OCI_PRIVATE_KEY_PATH: ${OCI_PRIVATE_KEY_PATH:-}
      OCI_REGION: ${OCI_REGION:-us-ashburn-1}
      OCI_NAMESPACE: ${OCI_NAMESPACE:-}
      OCI_BUCKET: ${OCI_BUCKET:-}

      # App Settings
      SECRET_KEY: ${SECRET_KEY:-change-this-to-a-random-secret-key}
      DEMO_MODE: ${DEMO_MODE:-false}

      # Admin User (created on first startup)
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}

      # Uvicorn
      UVICORN_WORKERS: ${UVICORN_WORKERS:-4}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    networks:
      - audiototext-network

  # ---- Self-Signed SSL Certificate Generator (default) ----
  ssl-init:
    image: alpine:3.20
    container_name: audiototext-ssl-init
    restart: "no"
    profiles:
      - selfsigned
    volumes:
      - ssl_certs:/etc/nginx/ssl
    entrypoint: |
      sh -c "
        apk add --no-cache openssl &&
        openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
          -keyout /etc/nginx/ssl/key.pem \
          -out /etc/nginx/ssl/cert.pem \
          -subj '/CN=localhost/O=AudioToText/C=US' &&
        echo 'Self-signed SSL certificate generated'
      "

  # ---- Let's Encrypt Initializer (profile: letsencrypt) ----
  certbot-init:
    image: certbot/certbot:latest
    container_name: audiototext-certbot-init
    restart: "no"
    profiles:
      - letsencrypt
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - acme_challenge:/var/www/html
    entrypoint: |
      sh -c "
        if [ -z \"$${DOMAIN_NAME}\" ]; then
          echo 'ERROR: DOMAIN_NAME must be set when using Let'\''s Encrypt'
          exit 1
        fi
        certbot certonly --webroot -w /var/www/html \
          -d $${DOMAIN_NAME} \
          --non-interactive \
          --agree-tos \
          --email $${LETS_ENCRYPT_EMAIL:-admin@$${DOMAIN_NAME}} \
          || echo 'Certbot failed - check DOMAIN_NAME and that port 80 is accessible'
      "

  # ---- Let's Encrypt Renewal (profile: letsencrypt) ----
  certbot-renew:
    image: certbot/certbot:latest
    container_name: audiototext-certbot-renew
    restart: unless-stopped
    profiles:
      - letsencrypt
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - acme_challenge:/var/www/html
    entrypoint: |
      sh -c "
        while true; do
          certbot renew --quiet
          sleep 86400
        done
      "

  # ---- Nginx Reverse Proxy ----
  nginx:
    image: nginx:1.27-alpine
    container_name: audiototext-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "443:443"
      - "80:80"
    environment:
      # Used by nginx-entrypoint.sh to detect Let's Encrypt certs
      DOMAIN_NAME: ${DOMAIN_NAME:-}
    volumes:
      # Entrypoint script that auto-detects which SSL config to use
      - ./nginx-entrypoint.sh:/usr/local/bin/nginx-entrypoint.sh:ro
      # Let's Encrypt nginx config template (used when LE certs exist)
      - ./nginx.letsencrypt.conf:/etc/nginx/nginx.letsencrypt.conf:ro
      # Self-signed nginx config (used when LE certs don't exist)
      - ./nginx.conf:/etc/nginx/nginx.selfsigned.conf:ro
      # Self-signed certs (used when LETS_ENCRYPT_ENABLED=false)
      - ssl_certs:/etc/nginx/ssl:ro
      # Let's Encrypt certs (used when LETS_ENCRYPT_ENABLED=true)
      # Uses host bind mount so certs persist on the host filesystem
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # ACME challenge directory
      - acme_challenge:/var/www/html
      # Logs
      - nginx_logs:/var/log/nginx
    entrypoint: ["/bin/sh", "/usr/local/bin/nginx-entrypoint.sh"]
    networks:
      - audiototext-network

networks:
  audiototext-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local
  ssl_certs:
    driver: local
  nginx_logs:
    driver: local
  acme_challenge:
    driver: local
